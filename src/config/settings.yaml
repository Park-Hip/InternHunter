llm:
  primary_provider: "gemini"
  fallback_provider: "groq"
  validation_model: "gemini-2.0-flash-lite"
  
  gemini:
    model: "gemini-2.5-flash-lite"
    temperature: 0.1
    max_tokens: 2048
    
  groq:
    model: "llama-3.3-70b-versatile"
    temperature: 0.0
    max_tokens: 1024

agent:
  max_iterations: 5
  memory_limit: 10

crawler:
  rate_limit_rpm: 20
  max_retries: 3
  max_pages: 5
  extract_delay_min: 10.0
  extract_delay_max: 15.0

logging:
  format: "console"
  level: "INFO"

mlflow:
  tracking_uri: "sqlite:///mlflow.db"
  experiment: "job-finder"
